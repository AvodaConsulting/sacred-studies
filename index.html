    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#3f6212",
              "primary-dark": "#365314",
              accent: "#b89c3a",
              surface: "#ffffff",
              "text-main": "#2c2c2c",
              "text-muted": "#6b7280",
              "background-light": "#f8f7f4",
              "card-border": "#e5e7eb",
              sage: {
                50: '#f4f7f2',
                100: '#e5efe0',
                600: '#3f6212',
                700: '#365314',
                800: '#2d3a16',
              },
              gold: {
                500: '#b89c3a',
                600: '#9a7209',
              },
              paper: '#FDFBF7',
            },
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              serif: ['Crimson Pro', 'serif'],
              display: ['Manrope', 'sans-serif'],
            },
            boxShadow: {
              soft: "0 4px 20px -2px rgba(0, 0, 0, 0.05)",
              input: "0 2px 4px rgba(0,0,0,0.02) inset",
              '3xl': '0 35px 60px -15px rgba(0, 0, 0, 0.1)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f8f7f4;
        color: #2c2c2c;
        font-family: 'Manrope', sans-serif;
      }
      
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(63, 98, 18, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(63, 98, 18, 0.4);
      }
      
      input[type=range] {
        height: 8px;
        background: #e5e5e0;
        border-radius: 999px;
        appearance: none;
        cursor: pointer;
      }
      input[type=range]::-webkit-slider-thumb {
        appearance: none;
        width: 20px;
        height: 20px;
        background: #3f6212;
        border: 2px solid white;
        border-radius: 50%;
        cursor: pointer;
        shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }

      @media print {
        body * {
          visibility: hidden;
        }
        .print-only-content, .print-only-content * {
          visibility: visible;
        }
        .print-only-content {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
          background: white !important;
        }
        @page {
          margin: 2cm;
        }
      }
    </style>
  <script type="importmap">

}
